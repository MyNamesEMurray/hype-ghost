name: Release Please

# Automated releases: every merge into main updates a standing release PR
# whose version bump + changelog are computed from conventional commit
# prefixes (feat: -> minor, fix: -> patch, feat!: -> major). Merging that
# PR cuts the release: release-please creates it as a DRAFT, the job below
# builds the Windows installer, attaches it (exe + blockmap + latest.yml),
# and only then publishes — so the auto-updater can never see a release
# without its installer. The tag-push/manual Release workflow remains as a
# fallback.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp

  installer:
    name: Build installer & publish release
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      # Full install (no --ignore-scripts): the Electron binary is needed
      # to package the app.
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build the Windows installer
        run: npx electron-builder --win --publish never

      - name: Attach installer and publish the release
        shell: bash
        run: |
          gh release upload '${{ needs.release-please.outputs.tag_name }}' dist/*.exe dist/*.exe.blockmap dist/latest.yml
          gh release edit '${{ needs.release-please.outputs.tag_name }}' --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
