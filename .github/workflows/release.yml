name: Release

# Cut a release either by tagging main with the package.json version:
#   git tag v3.1.0 && git push origin v3.1.0
# or by running this workflow manually against main (Actions → Release →
# Run workflow), which tags the built commit as v<package.json version>.
# Both paths build the Windows installer and publish the GitHub Release
# the auto-updater reads (installer + blockmap + latest.yml), with
# release notes taken from RELEASE_NOTES.md at the built commit.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build installer & publish release
    # Windows because it's the shipping target (tray, NSIS, %APPDATA% paths).
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      # Full install (no --ignore-scripts): the Electron binary is needed
      # to package the app.
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build the Windows installer
        run: npx electron-builder --win --publish never

      # Tag runs release the pushed tag; manual runs tag the built commit
      # as v<package.json version> when the release is published.
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Hype Ghost ${{ steps.tag.outputs.tag }}
          tag_name: ${{ steps.tag.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
