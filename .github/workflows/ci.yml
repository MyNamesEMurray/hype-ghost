name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Lint & smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      # --ignore-scripts skips the Electron binary download and native builds
      # (sharp, etc.). None are needed to syntax-check the source or boot the
      # headless server, and it keeps CI fast.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Syntax-check all JS
        run: |
          files=$(git ls-files '*.js' '*.mjs')
          echo "$files"
          for f in $files; do node --check "$f"; done

      - name: Validate config.example.json
        run: node -e "JSON.parse(require('fs').readFileSync('config.example.json','utf8')); console.log('config.example.json is valid JSON')"

      - name: Run tests
        run: npm test

      - name: Headless server smoke test
        run: npm run smoke

  # The SAPI text-to-speech pipeline (PowerShell → WAV) only exists on
  # Windows — run the suite there too so it's actually exercised.
  test-windows:
    name: Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test
