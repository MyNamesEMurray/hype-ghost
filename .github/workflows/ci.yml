name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # windows-latest because Windows is the shipping target (tray, NSIS,
    # %APPDATA% paths) — the tests themselves are platform-agnostic.
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      # Smoke mode boots the full Electron app headless, fetches the
      # dashboard, and exits 0/1 — the closest thing to an e2e check.
      - run: npm start
        env:
          HG_SMOKE: '1'

  # Installer build on tags only — keeps releases reproducible from CI
  # instead of a local machine. Uploaded as an artifact (not auto-published).
  installer:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist/*.exe
