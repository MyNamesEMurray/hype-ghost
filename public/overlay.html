<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hype Ghost Overlay</title>
<link rel="stylesheet" href="/theme.css">
<style>
  /* Transparent overlay for OBS Browser Source. Recommended size: 460x620.
     A guest on someone's stream: shares the color tokens, keeps its own
     bolder text-shadowed typography for legibility over video, and — non-
     negotiably — the AI badge on every message and a permanent watermark.
     Customization (align, scale, fade, density, theme, reactions) comes
     from /api/overlay-config. */
  html, body { background: transparent !important; }
  body {
    --scale: 1;
    overflow: hidden;
    font: 600 calc(16px * var(--scale))/1.4 "Inter", "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column; justify-content: flex-end;
    height: 100vh; padding: 12px; gap: 8px;
  }
  #stack { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  body.align-right #stack, body.align-right { align-items: flex-end; text-align: right; }
  body.align-right #watermark { align-self: flex-end; }

  .msg {
    max-width: 100%; word-wrap: break-word;
    background: rgba(12, 12, 18, 0.78);
    border: 1px solid rgba(255,255,255,.08);
    border-left: 3px solid var(--gc, #5ad1ff);
    border-radius: 12px; padding: 7px 12px;
    color: #f4f4fa; text-shadow: 0 1px 2px rgba(0,0,0,.65);
    animation: slidein .28s ease-out; transition: opacity .8s;
  }
  body.align-right .msg { border-left: none; border-right: 3px solid var(--gc, #5ad1ff); }
  .msg.streamer { --gc: var(--accent); }
  .msg.faded { opacity: 0; }
  @keyframes slidein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .msg .badge-ai { font-weight: 800; margin-right: 6px; vertical-align: 1px; }
  .msg .name { font-weight: 800; margin-right: 6px; color: var(--gc, #5ad1ff); }
  .msg.streamer .name { color: var(--accent-2); }

  /* theme: compact — tighter single-line lines, no card fill */
  body.compact .msg { background: transparent; border: none; padding: 2px 0; text-shadow: 0 1px 3px rgba(0,0,0,.9), 0 0 2px rgba(0,0,0,.9); }

  /* clip-worthy moment flash (only when reactions are on) */
  .flash {
    align-self: center; display: flex; align-items: center; gap: 8px;
    padding: 6px 16px; border-radius: 999px; font-weight: 800;
    background: rgba(12,12,18,.82); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.7);
    border: 1px solid rgba(255,255,255,.18);
    animation: flashpop .5s cubic-bezier(.2,1.4,.4,1);
  }
  .flash .spark { background: var(--aurora); -webkit-background-clip: text; background-clip: text; color: transparent; }
  @keyframes flashpop { 0% { opacity:0; transform: scale(.8); } 100% { opacity:1; transform: none; } }

  #watermark {
    font-size: calc(11px * var(--scale)); font-weight: 700; letter-spacing: .02em;
    color: rgba(255,255,255,.8); text-shadow: 0 1px 2px rgba(0,0,0,.75);
    background: rgba(12,12,18,.6); border-radius: 8px; padding: 3px 9px;
    align-self: flex-start;
  }
</style>
</head>
<body>
  <div id="stack"></div>
  <div id="watermark">🤖 AI practice chat — simulated viewers, not real people</div>

<script>
  let cfg = { align: 'left', fontScale: 1, fadeSeconds: 0, maxVisible: 6, theme: 'cards', reactions: true };
  let colors = {}; // author name -> hex
  const stack = document.getElementById('stack');

  const ACCENTS = { violet:['#a78bfa','#c4b5fd'], cyan:['#38bdf8','#7dd3fc'], emerald:['#34d399','#6ee7b7'], amber:['#fbbf24','#fcd34d'], magenta:['#f472b6','#f9a8d4'] };

  fetch('/api/overlay-config')
    .then((r) => r.json())
    .then((d) => {
      cfg = { ...cfg, ...d.overlay };
      (d.cast || []).forEach((c) => { colors[c.name] = c.color; });
      const a = ACCENTS[d.accent] || ACCENTS.violet;
      document.documentElement.style.setProperty('--accent', a[0]);
      document.documentElement.style.setProperty('--accent-2', a[1]);
      document.body.style.setProperty('--scale', cfg.fontScale || 1);
      document.body.classList.toggle('align-right', cfg.align === 'right');
      document.body.classList.toggle('compact', cfg.theme === 'compact');
    })
    .catch(() => {});

  function addMessage(m) {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    div.style.setProperty('--gc', m.role === 'streamer' ? 'var(--accent)' : (m.color || colors[m.author] || '#5ad1ff'));
    div.innerHTML = `${m.role === 'bot' ? '<span class="badge-ai">🤖 AI</span>' : ''}<span class="name"></span><span class="text"></span>`;
    div.querySelector('.name').textContent = m.author + ':';
    div.querySelector('.text').textContent = ' ' + m.text;
    stack.appendChild(div);
    while (stack.children.length > (cfg.maxVisible || 6)) stack.removeChild(stack.firstChild);
    if (cfg.fadeSeconds > 0) {
      setTimeout(() => div.classList.add('faded'), cfg.fadeSeconds * 1000);
      setTimeout(() => div.remove(), cfg.fadeSeconds * 1000 + 900);
    }
  }

  function flashMoment(mo) {
    if (!cfg.reactions) return;
    const div = document.createElement('div');
    div.className = 'flash';
    div.innerHTML = `<span class="spark">✨</span><span></span>`;
    div.children[1].textContent = mo.label;
    stack.appendChild(div);
    while (stack.children.length > (cfg.maxVisible || 6)) stack.removeChild(stack.firstChild);
    setTimeout(() => { div.classList.add('faded'); setTimeout(() => div.remove(), 900); }, 4500);
  }

  function connect() {
    const ws = new WebSocket(`ws://${location.host}`);
    ws.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'init') { stack.innerHTML = ''; msg.history.slice(-(cfg.maxVisible || 6)).forEach(addMessage); }
      else if (msg.type === 'chat') addMessage(msg.msg);
      else if (msg.type === 'moment') flashMoment(msg.moment);
    };
    // OBS browser sources live a long time — auto-reconnect if the server restarts.
    ws.onclose = () => setTimeout(connect, 3000);
  }
  connect();
</script>
</body>
</html>
