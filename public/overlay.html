<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hype Ghost Overlay</title>
<link rel="stylesheet" href="/theme.css">
<style>
  /* Transparent overlay for OBS Browser Source. Recommended size: 460x600.
     A guest on someone's stream: shares the color tokens, keeps its own
     bolder text-shadowed typography for legibility over video. */
  body {
    background: transparent; overflow: hidden;
    font: 600 17px/1.4 "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column; justify-content: flex-end;
    height: 100vh; padding: 12px;
  }
  #stack { display: flex; flex-direction: column; gap: 8px; }
  .msg {
    background: rgba(12, 12, 18, 0.82);
    border-radius: var(--r-md); padding: 8px 12px;
    color: #f0f0f6; text-shadow: 0 1px 2px rgba(0,0,0,.6);
    animation: slidein .25s ease-out;
    word-wrap: break-word;
  }
  @keyframes slidein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .msg .name { font-weight: 800; margin-right: 6px; }
  .msg.bot .name { color: var(--ghost); }
  .msg.streamer .name { color: var(--accent-bright); }
  .badge-ai { font-weight: 800; margin-right: 6px; vertical-align: 2px; }
  #watermark {
    margin-top: 8px; font-size: var(--fs-xs); font-weight: 600;
    color: rgba(255,255,255,.75); text-shadow: 0 1px 2px rgba(0,0,0,.7);
    background: rgba(12,12,18,.6); border-radius: var(--r-sm); padding: 3px 8px;
    align-self: flex-start;
  }
</style>
</head>
<body>
  <div id="stack"></div>
  <div id="watermark">🤖 AI practice chat — simulated viewer, not a real person</div>

<script>
  const MAX_VISIBLE = 6;
  const stack = document.getElementById('stack');

  function addMessage(m) {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    div.innerHTML = `${m.role === 'bot' ? '<span class="badge-ai">🤖 AI</span>' : ''}<span class="name"></span><span class="text"></span>`;
    div.querySelector('.name').textContent = m.author + ':';
    div.querySelector('.text').textContent = ' ' + m.text;
    stack.appendChild(div);
    while (stack.children.length > MAX_VISIBLE) stack.removeChild(stack.firstChild);
  }

  function connect() {
    const ws = new WebSocket(`ws://${location.host}`);
    ws.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'init') {
        stack.innerHTML = '';
        msg.history.slice(-MAX_VISIBLE).forEach(addMessage);
      } else if (msg.type === 'chat') {
        addMessage(msg.msg);
      }
    };
    // OBS browser sources live a long time — auto-reconnect if the server restarts.
    ws.onclose = () => setTimeout(connect, 3000);
  }
  connect();
</script>
</body>
</html>
