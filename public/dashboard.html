<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hype Ghost — Practice Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/theme.css">
<style>
  /* layout only — tokens & components come from theme.css */
  body { height: 100vh; display: flex; flex-direction: column; }
  header {
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  header .app-title span { color: var(--accent); }
  .spacer { flex: 1; }
  /* dense toolbar: compact controls are a deliberate density override */
  header button, header select { padding: 6px 12px; font-size: var(--fs-sm); }
  header select { width: auto; }
  /* mic pill is fixed-width so live transcript updates never reflow the header */
  #pill-mic { flex: none; width: 190px; overflow: hidden; text-overflow: ellipsis; text-align: left; }
  #countdown { font-variant-numeric: tabular-nums; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 720px; }
  .msg .meta { font-size: var(--fs-xs); color: var(--dim); margin-bottom: 2px; display: flex; gap: 6px; align-items: center; }
  .msg .name { font-weight: 600; font-size: var(--fs-sm); }
  .msg.bot .name { color: var(--ghost); }
  .msg.streamer .name { color: var(--accent); }
  .msg .text {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--r-md); padding: 8px 12px; display: inline-block;
  }
  .msg.streamer { align-self: flex-end; text-align: right; }
  .msg.streamer .meta { justify-content: flex-end; }
  .msg.streamer .text { background: var(--accent-tint); border-color: var(--accent-tint-border); }
  .sys { align-self: center; font-size: var(--fs-xs); color: var(--warn); }
  footer { padding: 12px 16px; background: var(--panel); border-top: 1px solid var(--border); display: flex; gap: 10px; }
  footer input { flex: 1; }
</style>
</head>
<body>
  <header>
    <h1 class="app-title">👻 Hype Ghost <span id="botname"></span></h1>
    <span class="pill" id="pill-obs">OBS: …</span>
    <span class="pill" id="pill-key">API key: …</span>
    <span class="pill" id="pill-viewers">Viewers: …</span>
    <span class="pill" id="pill-mic" title="Mic transcription via the LocalVocal OBS plugin">Mic: …</span>
    <span class="pill" id="pill-cost" style="display:none"></span>
    <span class="pill" id="countdown"></span>
    <div class="spacer"></div>
    <label class="pill" style="display:flex;align-items:center;gap:6px;">
      Mode
      <select id="mode">
        <option value="auto">Auto (Twitch)</option>
        <option value="solo">Solo (chatty)</option>
        <option value="viewers">Viewers present (quiet)</option>
      </select>
    </label>
    <button id="nudge">Say something</button>
    <button id="pause" class="primary">Pause</button>
    <button id="settings" aria-label="Settings" title="Settings" onclick="location.href='/settings'">⚙</button>
  </header>

  <div id="messages"></div>

  <footer>
    <input id="input" placeholder="Reply to your practice chat… (the ghost will answer)" autocomplete="off">
    <button id="send" class="primary">Send</button>
  </footer>

<script>
  const $ = (id) => document.getElementById(id);
  const messagesEl = $('messages');
  let state = {};
  let ws = null;

  function addMessage(m) {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    const time = new Date(m.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = `
      <div class="meta">
        <span class="name"></span>
        ${m.role === 'bot' ? '<span class="badge-ai">🤖 AI</span>' : ''}
        <span>${time}</span>
      </div>
      <div class="text"></div>`;
    // your own messages read "You" here; the overlay keeps "Streamer" for viewers
    div.querySelector('.name').textContent = m.role === 'streamer' ? 'You' : m.author;
    div.querySelector('.text').textContent = m.text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addSystem(text) {
    const div = document.createElement('div');
    div.className = 'sys';
    div.textContent = '⚠ ' + text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function renderState() {
    $('botname').textContent = '· ' + (state.botName || '');
    const obsPill = $('pill-obs');
    obsPill.textContent = 'OBS: ' + (state.obsConnected ? 'connected' : 'not connected');
    obsPill.className = 'pill ' + (state.obsConnected ? 'good' : 'bad');
    const keyPill = $('pill-key');
    keyPill.textContent = 'API key: ' + (state.apiKeySet ? 'set' : 'missing');
    keyPill.className = 'pill ' + (state.apiKeySet ? 'good' : 'bad');
    const vPill = $('pill-viewers');
    if (!state.twitchConfigured && state.viewerOverride === 'auto') {
      vPill.textContent = 'Viewers: manual only';
      vPill.className = 'pill';
    } else {
      vPill.textContent = `Viewers: ${state.realViewers ?? '?'} · mode: ${state.mode}`;
      vPill.className = 'pill ' + (state.mode === 'viewers' ? 'good' : '');
    }
    $('mode').value = state.viewerOverride;
    $('pause').textContent = state.paused ? 'Resume' : 'Pause';
    $('pause').className = state.paused ? '' : 'primary';
    renderMic();
    renderCost();
  }

  function renderMic() {
    const pill = $('pill-mic');
    if (!state.transcriptMode || state.transcriptMode === 'off') {
      pill.textContent = 'Mic: off';
      pill.className = 'pill';
      return;
    }
    const heardRecently = state.lastHeard && Date.now() - state.lastHeard.ts < 15000;
    if (heardRecently) {
      // fixed-width pill + CSS ellipsis truncates; title shows the full line
      pill.textContent = '🎙 ' + state.lastHeard.text;
      pill.title = state.lastHeard.text;
      pill.className = 'pill good';
    } else {
      pill.textContent = state.lastHeard ? 'Mic: quiet' : 'Mic: waiting…';
      pill.className = 'pill';
    }
  }

  function renderCost() {
    const pill = $('pill-cost');
    const u = state.usage;
    if (!state.costMeter || !u || u.messages === 0) { pill.style.display = 'none'; return; }
    pill.style.display = '';
    pill.textContent = u.costKnown
      ? `$${u.cost.toFixed(3)} · ${u.messages} msgs`
      : `${u.messages} msgs · ${Math.round((u.inputTokens + u.outputTokens) / 1000)}k tokens`;
    pill.title = `This session: ${u.messages} messages, ${u.inputTokens.toLocaleString()} input + ${u.outputTokens.toLocaleString()} output tokens`;
  }

  setInterval(() => {
    const el = $('countdown');
    if (state.paused) {
      const reasons = { obs: 'auto-paused (OBS gone)', api: 'auto-paused (API errors)', cost: 'auto-paused (cost cap)' };
      el.textContent = state.autoPaused ? (reasons[state.pauseReason] || 'auto-paused') : 'paused';
      return;
    }
    if (state.busy) { el.textContent = 'typing…'; return; }
    if (!state.nextMessageAt) { el.textContent = ''; return; }
    const s = Math.max(0, Math.round((state.nextMessageAt - Date.now()) / 1000));
    el.textContent = `next message in ~${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
  }, 500);
  setInterval(renderMic, 2000); // "hearing you" indicator is time-based

  // auto-reconnect: the dashboard survives server restarts and sleep/wake
  let announcedDrop = false;
  function connect() {
    ws = new WebSocket(`ws://${location.host}`);
    ws.onopen = () => { announcedDrop = false; };
    ws.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'init') {
        state = msg.state;
        messagesEl.innerHTML = '';
        msg.history.forEach(addMessage);
        renderState();
      } else if (msg.type === 'chat') {
        addMessage(msg.msg);
      } else if (msg.type === 'state') {
        state = msg.state;
        renderState();
      } else if (msg.type === 'system') {
        addSystem(msg.text);
      }
    };
    ws.onclose = () => {
      if (!announcedDrop) {
        announcedDrop = true;
        addSystem('Connection lost — reconnecting…');
      }
      setTimeout(connect, 3000);
    };
  }
  connect();

  function sendCmd(cmd) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify(cmd));
  }
  function send() {
    const text = $('input').value.trim();
    if (!text) return;
    sendCmd({ type: 'streamer_message', text });
    $('input').value = '';
  }
  $('send').onclick = send;
  $('input').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
  $('pause').onclick = () => sendCmd({ type: state.paused ? 'resume' : 'pause' });
  $('nudge').onclick = () => sendCmd({ type: 'nudge' });
  $('mode').onchange = (e) => sendCmd({ type: 'override_viewers', value: e.target.value });
</script>
</body>
</html>
