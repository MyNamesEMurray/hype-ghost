<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hype Ghost — Practice Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/theme.css">
<style>
  /* layout only — tokens & components come from theme.css */
  body { height: 100vh; display: flex; }
  /* ---- sidebar ---- */
  aside {
    width: 232px; flex: none; display: flex; flex-direction: column; gap: 4px;
    background: var(--panel); border-right: 1px solid var(--border); padding: 16px 14px;
  }
  aside .app-title { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  #personas { font-size: var(--fs-sm); margin-bottom: 8px; }
  #personas .p0 { color: var(--ghost); font-weight: 600; }
  #personas .p1 { color: var(--ghost2); font-weight: 600; }
  #countdown { font-size: var(--fs-xs); color: var(--dim); font-variant-numeric: tabular-nums; min-height: 18px; margin-bottom: 8px; }
  #statuses { border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 6px 0; margin-bottom: 10px; }
  aside label.side { margin: 4px 0 4px; }
  aside select, aside button { width: 100%; margin-bottom: 8px; }
  #cost { margin-top: auto; font-size: var(--fs-xs); color: var(--dim); border-top: 1px solid var(--border); padding-top: 10px; display: none; }
  /* ---- chat ---- */
  main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #messages { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 680px; }
  .msg .meta { font-size: var(--fs-xs); color: var(--dim); margin-bottom: 2px; display: flex; gap: 6px; align-items: center; }
  .msg .name { font-weight: 600; font-size: var(--fs-sm); }
  .msg.bot .name { color: var(--ghost); }
  .msg.bot[data-p="1"] .name { color: var(--ghost2); }
  .msg.streamer .name { color: var(--accent); }
  .msg .text {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--r-md); padding: 8px 12px; display: inline-block;
  }
  .msg.streamer { align-self: flex-end; text-align: right; }
  .msg.streamer .meta { justify-content: flex-end; }
  .msg.streamer .text { background: var(--accent-tint); border-color: var(--accent-tint-border); }
  .sys { align-self: center; font-size: var(--fs-xs); color: var(--warn); }
  footer { padding: 12px 16px; background: var(--panel); border-top: 1px solid var(--border); display: flex; gap: 10px; }
  footer input { flex: 1; }
</style>
</head>
<body>
  <aside>
    <h1 class="app-title">👻 Hype Ghost</h1>
    <div id="personas"></div>
    <div id="countdown"></div>
    <div id="statuses">
      <div class="status" id="st-obs"><span class="dot"></span><span>OBS</span></div>
      <div class="status" id="st-brain"><span class="dot"></span><span data-i18n="brain">Brain</span></div>
      <div class="status" id="st-viewers"><span class="dot"></span><span data-i18n="viewers">Viewers</span></div>
      <div class="status" id="st-mic"><span class="dot"></span><span data-i18n="mic">Mic</span></div>
      <div class="status" id="st-chat" style="display:none"><span class="dot"></span><span data-i18n="chat">Chat</span></div>
    </div>
    <label class="side" data-i18n="mode">Mode</label>
    <select id="mode">
      <option value="auto" data-i18n="modeAuto">Auto</option>
      <option value="solo" data-i18n="modeSolo">Solo (chatty)</option>
      <option value="viewers" data-i18n="modeViewers">Viewers present (quiet)</option>
    </select>
    <button id="nudge" data-i18n="say">Say something</button>
    <button id="pause" class="primary" data-i18n="pause">Pause</button>
    <button onclick="location.href='/api/recap'" data-i18n="recap">Export recap</button>
    <button onclick="location.href='/settings'" data-i18n="settings">Settings</button>
    <div id="cost"></div>
  </aside>

  <main>
    <div id="messages"></div>
    <footer>
      <input id="input" autocomplete="off">
      <button id="send" class="primary" data-i18n="send">Send</button>
    </footer>
  </main>

<script>
  // ---- i18n (UI language set in Settings → App; the ghost's chat language is separate) ----
  const STR = {
    en: {
      brain: 'Brain', viewers: 'Viewers', mic: 'Mic', chat: 'Chat', mode: 'Mode',
      modeAuto: 'Auto', modeSolo: 'Solo (chatty)', modeViewers: 'Viewers present (quiet)',
      say: 'Say something', pause: 'Pause', resume: 'Resume', recap: 'Export recap',
      settings: 'Settings', send: 'Send', you: 'You',
      placeholder: 'Reply to your practice chat… (the ghost will answer)',
      paused: 'paused', autoPaused: 'auto-paused (OBS gone)', typing: 'typing…', next: 'next message in',
      obsOk: 'OBS connected', obsNo: 'OBS not connected', brainOk: 'Brain ready', brainNo: 'Brain not configured',
      viewersManual: 'Viewers: manual only', micOff: 'Mic off', micQuiet: 'Mic quiet', micWait: 'Mic waiting…',
      chatQuiet: 'Chat quiet', chatActive: 'Chat active', lost: 'Connection lost — reconnecting…', msgs: 'msgs',
    },
    es: {
      brain: 'Cerebro', viewers: 'Espectadores', mic: 'Micro', chat: 'Chat', mode: 'Modo',
      modeAuto: 'Auto', modeSolo: 'Solo (hablador)', modeViewers: 'Con espectadores (discreto)',
      say: 'Di algo', pause: 'Pausar', resume: 'Reanudar', recap: 'Exportar resumen',
      settings: 'Ajustes', send: 'Enviar', you: 'Tú',
      placeholder: 'Responde a tu chat de práctica… (el fantasma contestará)',
      paused: 'en pausa', autoPaused: 'pausa automática (sin OBS)', typing: 'escribiendo…', next: 'próximo mensaje en',
      obsOk: 'OBS conectado', obsNo: 'OBS desconectado', brainOk: 'Cerebro listo', brainNo: 'Cerebro sin configurar',
      viewersManual: 'Espectadores: manual', micOff: 'Micro apagado', micQuiet: 'Micro en silencio', micWait: 'Micro esperando…',
      chatQuiet: 'Chat tranquilo', chatActive: 'Chat activo', lost: 'Conexión perdida — reconectando…', msgs: 'msjs',
    },
  };
  let L = STR.en;
  const T = (k) => L[k] ?? STR.en[k] ?? k;
  function applyI18n() {
    document.querySelectorAll('[data-i18n]').forEach((el) => { el.textContent = T(el.dataset.i18n); });
    $('input').placeholder = T('placeholder');
  }

  const $ = (id) => document.getElementById(id);
  const messagesEl = $('messages');
  let state = {};
  let ws = null;
  let booted = false;

  function speak(text) {
    if (!state.tts || !state.tts.enabled || !('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    const v = speechSynthesis.getVoices().find((v) => v.name === state.tts.voice);
    if (v) u.voice = v;
    u.rate = state.tts.rate || 1;
    speechSynthesis.speak(u);
  }

  function addMessage(m, live) {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    if (m.role === 'bot') div.dataset.p = m.p ?? 0;
    const time = new Date(m.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = `
      <div class="meta">
        <span class="name"></span>
        ${m.role === 'bot' ? '<span class="badge-ai">🤖 AI</span>' : ''}
        <span>${time}</span>
      </div>
      <div class="text"></div>`;
    div.querySelector('.name').textContent = m.role === 'streamer' ? T('you') : m.author;
    div.querySelector('.text').textContent = m.text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    if (live && m.role === 'bot') speak(m.text);
  }

  function addSystem(text) {
    const div = document.createElement('div');
    div.className = 'sys';
    div.textContent = '⚠ ' + text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setStatus(id, cls, text) {
    const el = $(id);
    el.className = 'status ' + cls;
    el.lastElementChild.textContent = text;
  }

  function renderState() {
    L = STR[state.uiLanguage] ?? STR.en;
    applyI18n();
    $('personas').innerHTML = (state.personas || [])
      .map((n, i) => `<span class="p${i}"></span>`).join(' · ');
    document.querySelectorAll('#personas span').forEach((el, i) => { el.textContent = state.personas[i]; });

    setStatus('st-obs', state.obsConnected ? 'good' : 'bad', state.obsConnected ? T('obsOk') : T('obsNo'));
    setStatus('st-brain', state.apiKeySet ? 'good' : 'bad', state.apiKeySet ? T('brainOk') : T('brainNo'));
    if (!state.twitchConfigured && state.viewerOverride === 'auto' && state.chatPerMin === null) {
      setStatus('st-viewers', '', T('viewersManual'));
    } else {
      setStatus('st-viewers', state.mode === 'viewers' ? 'good' : '', `${T('viewers')}: ${state.realViewers ?? '?'} · ${state.mode}`);
    }
    const heard = state.lastHeard && Date.now() - state.lastHeard.ts < 15000;
    if (!state.transcriptMode || state.transcriptMode === 'off') setStatus('st-mic', '', T('micOff'));
    else if (heard) { setStatus('st-mic', 'good', '🎙 ' + state.lastHeard.text); $('st-mic').title = state.lastHeard.text; }
    else setStatus('st-mic', '', state.lastHeard ? T('micQuiet') : T('micWait'));
    if (state.chatPerMin !== null) {
      $('st-chat').style.display = '';
      const active = state.chatPerMin >= 2;
      setStatus('st-chat', active ? 'good' : '', `${active ? T('chatActive') : T('chatQuiet')} · ${state.chatPerMin}/min`);
    }

    $('mode').value = state.viewerOverride;
    $('pause').textContent = state.paused ? T('resume') : T('pause');
    $('pause').className = state.paused ? '' : 'primary';
    renderCost();
  }

  function renderCost() {
    const el = $('cost');
    const u = state.usage;
    if (!state.costMeter || !u || u.messages === 0) { el.style.display = 'none'; return; }
    el.style.display = '';
    el.textContent = u.costKnown
      ? `$${u.cost.toFixed(3)} · ${u.messages} ${T('msgs')}`
      : `${u.messages} ${T('msgs')} · ${Math.round((u.inputTokens + u.outputTokens) / 1000)}k tokens`;
    el.title = `${u.inputTokens.toLocaleString()} in + ${u.outputTokens.toLocaleString()} out tokens`;
  }

  // Countdown ticks only while the tab is visible — zero idle work when
  // the window is hidden or destroyed (resource posture: OBS and the game come first).
  setInterval(() => {
    if (document.hidden) return;
    const el = $('countdown');
    if (state.paused) { el.textContent = state.autoPaused ? T('autoPaused') : T('paused'); return; }
    if (state.busy) { el.textContent = T('typing'); return; }
    if (!state.nextMessageAt) { el.textContent = ''; return; }
    const s = Math.max(0, Math.round((state.nextMessageAt - Date.now()) / 1000));
    el.textContent = `${T('next')} ~${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
  }, 1000);
  setInterval(() => { if (!document.hidden) renderState(); }, 3000); // mic/chat freshness

  let announcedDrop = false;
  function connect() {
    ws = new WebSocket(`ws://${location.host}`);
    ws.onopen = () => { announcedDrop = false; };
    ws.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'init') {
        state = msg.state;
        messagesEl.innerHTML = '';
        msg.history.forEach((m) => addMessage(m, false));
        booted = true;
        renderState();
      } else if (msg.type === 'chat') {
        addMessage(msg.msg, booted);
      } else if (msg.type === 'state') {
        state = msg.state;
        renderState();
      } else if (msg.type === 'system') {
        addSystem(msg.text);
      }
    };
    ws.onclose = () => {
      if (!announcedDrop) { announcedDrop = true; addSystem(T('lost')); }
      setTimeout(connect, 3000);
    };
  }
  connect();

  const sendCmd = (cmd) => { if (ws && ws.readyState === 1) ws.send(JSON.stringify(cmd)); };
  function send() {
    const text = $('input').value.trim();
    if (!text) return;
    sendCmd({ type: 'streamer_message', text });
    $('input').value = '';
  }
  $('send').onclick = send;
  $('input').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
  $('pause').onclick = () => sendCmd({ type: state.paused ? 'resume' : 'pause' });
  $('nudge').onclick = () => sendCmd({ type: 'nudge' });
  $('mode').onchange = (e) => sendCmd({ type: 'override_viewers', value: e.target.value });
</script>
</body>
</html>
